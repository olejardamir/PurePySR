    namespace: "sr.arith"
    name: "add"
    version: "v1"
    arity: 2
    input_types: ["float64"]
    output_type: "float64"
    search_visible: true
    purity_class: "PURE"
    determinism: "DETERMINISTIC"
    complexity_cost: 1
    domain_policy:
      finite_inputs_required: true
      protected_domain: "all_real_finite"
    numeric_policy:
      nan_policy: "invalid_candidate"
      inf_policy: "invalid_candidate"
    implementations:
      numpy: "python_backend.ops.add_numpy"
      numba: null
    exports:
      sympy: "x + y"
      latex: "x + y"

